name: Release

on:
  push:
    tags:
      - "v*"

permissions: write-all

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          tar czf dirge-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release dirge

      - name: Upload release asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dirge-${{ matrix.target }}.tar.gz
          asset_name: dirge-${{ matrix.target }}.tar.gz
          tag: ${{ github.ref }}
          overwrite: true
